<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hail Mary — Communication System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --amber:        #e8821a;
      --amber-light:  #ff9f40;
      --amber-dim:    rgba(232, 130, 26, 0.13);
      --amber-border: rgba(232, 130, 26, 0.32);
      --amber-glow:   rgba(232, 130, 26, 0.45);
      --blue:         #1a6ae8;
      --blue-light:   #5a9fff;
      --blue-dim:     rgba(26, 106, 232, 0.13);
      --blue-border:  rgba(26, 106, 232, 0.32);
      --bg:           #07070f;
      --surface:      rgba(8, 9, 22, 0.94);
      --border:       rgba(22, 50, 80, 0.65);
      --text:         #d4d4e8;
      --text-dim:     #4a5a72;
      --green:        #00e87a;
      --green-dim:    rgba(0, 232, 122, 0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── Starfield ─────────────────────────────────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Subtle nebula glow */
    #nebula {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 15% 70%, rgba(40, 10, 80, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 20%, rgba(10, 40, 90, 0.3) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(60, 20, 5, 0.12) 0%, transparent 70%);
    }

    /* CRT scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.045) 2px, rgba(0, 0, 0, 0.045) 4px
      );
    }

    /* ── App shell ─────────────────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 14px 18px;
      gap: 14px;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--amber);
      position: relative;
      overflow: hidden;
    }

    /* corner decorations */
    .header::before, .header::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--amber);
      border-style: solid;
      opacity: 0.6;
    }
    .header::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .header::after  { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

    .header-left { display: flex; flex-direction: column; gap: 3px; }

    .header-title {
      font-size: 0.82em;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 4px;
    }

    .header-sub {
      font-size: 0.58em;
      color: var(--text-dim);
      letter-spacing: 2.5px;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.6em;
      letter-spacing: 2px;
    }

    .status-row.link  { color: var(--green); }
    .status-row.coord { color: var(--text-dim); }

    .blink-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 7px var(--green); }
      50%       { opacity: 0.2; box-shadow: none; }
    }

    /* ── Chat area ─────────────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 4px 2px 4px 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-area::-webkit-scrollbar       { width: 3px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Messages ──────────────────────────────────────────────────────── */
    .message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: msg-in 0.28s cubic-bezier(.2,.6,.4,1) both;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .avatar svg {
      position: relative;
      z-index: 1;
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 70%;
    }

    .message.user .msg-body { align-items: flex-end; }

    .msg-label {
      font-size: 0.6em;
      font-weight: 700;
      letter-spacing: 2.5px;
    }

    .message.rocky .msg-label { color: var(--amber); }
    .message.user  .msg-label { color: var(--blue-light); }

    .bubble {
      padding: 12px 16px;
      font-size: 0.87em;
      line-height: 1.7;
      position: relative;
    }

    .message.rocky .bubble {
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      border-top-left-radius: 0;
      border-radius: 2px;
      border-top-left-radius: 0;
      color: #ffd59a;
    }

    .message.user .bubble {
      background: var(--blue-dim);
      border: 1px solid var(--blue-border);
      border-radius: 2px;
      border-top-right-radius: 0;
      color: #a8cbff;
    }

    /* ping glow when Rocky responds */
    .message.rocky.ping .bubble {
      animation: msg-in 0.28s cubic-bezier(.2,.6,.4,1) both,
                 rocky-ping 1s ease 0.28s;
    }

    @keyframes rocky-ping {
      0%   { box-shadow: 0 0 0 0 var(--amber-glow); }
      55%  { box-shadow: 0 0 0 16px rgba(232,130,26,0); }
      100% { box-shadow: 0 0 0 0 rgba(232,130,26,0); }
    }

    .message.rocky.transmitting .bubble {
      overflow: hidden;
      border-color: rgba(255, 159, 64, 0.72);
      background:
        linear-gradient(110deg, rgba(255, 159, 64, 0.16), rgba(232, 130, 26, 0.06) 34%, rgba(255, 213, 154, 0.13) 68%, rgba(232, 130, 26, 0.08)),
        var(--amber-dim);
      box-shadow:
        0 0 20px rgba(232, 130, 26, 0.18),
        inset 0 0 18px rgba(232, 130, 26, 0.08);
    }

    .message.rocky.transmitting .bubble::before {
      content: '';
      position: absolute;
      inset: 0;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255, 213, 154, 0.24), transparent);
      transform: translateX(-130%) skewX(-14deg);
      animation: transmission-scan 1.15s linear infinite;
      pointer-events: none;
    }

    .message.rocky.transmitting .bubble::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      animation: tone-line 0.72s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes transmission-scan {
      to { transform: translateX(330%) skewX(-14deg); }
    }

    @keyframes tone-line {
      0%, 100% { opacity: 0.25; transform: scaleX(0.35); }
      50%      { opacity: 1;    transform: scaleX(1); }
    }

    /* ── Typing indicator ──────────────────────────────────────────────── */
    .typing-msg {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: msg-in 0.22s ease both;
    }

    .typing-bubble {
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      border-radius: 2px;
      border-top-left-radius: 0;
      padding: 11px 16px;
      font-size: 0.72em;
      color: var(--amber);
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dots { display: flex; gap: 4px; align-items: center; }

    .dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      animation: dot-jump 1.3s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dot-jump {
      0%, 58%, 100% { transform: translateY(0); opacity: 0.3; }
      29%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--amber);
      position: relative;
    }

    .input-bar::before, .input-bar::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--amber);
      border-style: solid;
      opacity: 0.5;
    }
    .input-bar::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .input-bar::after  { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

    .prompt-tag {
      font-size: 0.82em;
      font-weight: 700;
      color: var(--amber);
      flex-shrink: 0;
      user-select: none;
      padding-right: 10px;
      border-right: 1px solid var(--border);
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.87em;
      caret-color: var(--amber);
      padding: 0 8px;
    }

    #msg-input::placeholder { color: var(--text-dim); }
    #msg-input:disabled     { opacity: 0.4; }

    #send-btn {
      flex-shrink: 0;
      background: var(--amber);
      color: #07070f;
      border: none;
      padding: 8px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 2.5px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--amber-light);
      box-shadow: 0 0 14px rgba(232, 130, 26, 0.5);
    }

    #send-btn:disabled {
      background: #1a2a3a;
      color: #3a4a5a;
      cursor: not-allowed;
    }

    /* ── Empty state hint ──────────────────────────────────────────────── */
    .hint {
      font-size: 0.65em;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-align: center;
      padding: 8px 0;
      opacity: 0.6;
    }

    /* ── Voice toggle button ───────────────────────────────────────────── */
    .voice-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.6em;
      letter-spacing: 2px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
      margin-top: 2px;
    }

    .voice-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    .voice-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 8px rgba(232, 130, 26, 0.25);
    }

    .voice-btn.active .voice-icon { fill: var(--amber); }

    .voice-icon { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }

    /* Rocky avatar signal while speaking */
    .avatar.speaking svg {
      animation: rocky-talk 0.52s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(232, 130, 26, 0.9));
    }

    .avatar.speaking::before,
    .avatar.speaking::after {
      content: '';
      position: absolute;
      inset: -7px;
      border: 1px solid rgba(255, 159, 64, 0.45);
      border-radius: 50%;
      animation: signal-ring 1.35s ease-out infinite;
      pointer-events: none;
    }

    .avatar.speaking::after {
      animation-delay: 0.48s;
      border-color: rgba(0, 232, 122, 0.25);
    }

    @keyframes rocky-talk {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
      25%      { transform: translateY(-2px) scale(1.04) rotate(-2deg); }
      55%      { transform: translateY(1px) scale(0.98) rotate(1.5deg); }
      80%      { transform: translateY(-1px) scale(1.02) rotate(2deg); }
    }

    @keyframes signal-ring {
      0%   { opacity: 0.85; transform: scale(0.74); box-shadow: 0 0 8px rgba(232, 130, 26, 0.35); }
      72%  { opacity: 0;    transform: scale(1.36); box-shadow: 0 0 22px rgba(232, 130, 26, 0); }
      100% { opacity: 0;    transform: scale(1.36); }
    }

    /* ── Streaming cursor ─────────────────────────────────────────────── */
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 0.9em;
      background: var(--amber);
      margin-left: 2px;
      vertical-align: text-bottom;
      border-radius: 1px;
      animation: cur-blink 0.7s step-end infinite;
      box-shadow: 0 0 6px var(--amber-glow);
    }

    @keyframes cur-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Tab navigation ───────────────────────────────────────────────── */
    .tab-nav {
      flex-shrink: 0;
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.62em;
      font-weight: 700;
      letter-spacing: 2.5px;
      padding: 8px 20px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--amber); }
    .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

    .tab-panel { display: none; flex: 1; flex-direction: column; gap: 14px; min-height: 0; }
    .tab-panel.active { display: flex; }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .app { padding: 10px 12px; }
      .header-title { font-size: 0.68em; letter-spacing: 2px; }
      .header-sub, .status-row.coord { display: none; }
      .msg-body { max-width: 82%; }
    }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="nebula"></div>
<div class="scanlines"></div>

<!-- Global SVG defs — gradients shared across all avatar instances -->
<svg style="display:none" aria-hidden="true">
  <defs>
    <radialGradient id="rocky-body" cx="38%" cy="32%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#f5b040"/>
      <stop offset="55%"  stop-color="#c8711a"/>
      <stop offset="100%" stop-color="#6a3008"/>
    </radialGradient>
    <radialGradient id="grace-helm" cx="40%" cy="35%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#4a8aff"/>
      <stop offset="100%" stop-color="#0a3080"/>
    </radialGradient>
  </defs>
</svg>

<div class="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="header-title">HAIL MARY — COMMUNICATION SYSTEM</div>
      <div class="header-sub">TAU CETI SYSTEM &nbsp;·&nbsp; DEEP SPACE RELAY &nbsp;·&nbsp; CHANNEL 7</div>
    </div>
    <div class="header-right">
      <div class="status-row link">
        <div class="blink-dot"></div>
        ERIDIAN LINK ESTABLISHED
      </div>
      <div class="status-row coord">VESSEL: BLIP-A &nbsp;·&nbsp; DIST: 12.3 AU</div>
      <button class="voice-btn active" id="voice-btn" title="Toggle Rocky's voice">
        <svg class="voice-icon" id="voice-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        VOICE
      </button>
    </div>
  </header>

  <!-- ── Tab nav ───────────────────────────────────────── -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="text">TEXT CHANNEL</button>
  </nav>

  <!-- ── Text tab ───────────────────────────────────────── -->
  <div class="tab-panel active" id="tab-text">
    <main class="chat-area" id="chat"></main>
    <div class="input-bar">
      <span class="prompt-tag">GRACE ></span>
      <input id="msg-input" type="text" placeholder="Transmit message to Rocky..." autocomplete="off" spellcheck="false">
      <button id="send-btn">TRANSMIT</button>
    </div>
  </div>

</div>

<script>
'use strict';

// ── SVG templates ──────────────────────────────────────────────────────────────
// Rocky: 5-legged Eridian with tone holes on carapace, no eyes
const ROCKY_SVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="48" height="48" aria-label="Rocky the Eridian">
  <!-- Legs (drawn behind body) -->
  <polyline points="58,36 74,17 89,11"   fill="none" stroke="#9a4e0e" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="65,48 84,43 95,56"   fill="none" stroke="#9a4e0e" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,59 71,75 70,90"   fill="none" stroke="#9a4e0e" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="40,59 29,75 30,90"   fill="none" stroke="#9a4e0e" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="34,46 16,40  5,53"   fill="none" stroke="#9a4e0e" stroke-width="4"   stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Leg joint highlights -->
  <circle cx="74" cy="17" r="2.8" fill="#b86010" opacity="0.8"/>
  <circle cx="84" cy="43" r="2.8" fill="#b86010" opacity="0.8"/>
  <circle cx="71" cy="75" r="2.8" fill="#b86010" opacity="0.8"/>
  <circle cx="29" cy="75" r="2.8" fill="#b86010" opacity="0.8"/>
  <circle cx="16" cy="40" r="2.8" fill="#b86010" opacity="0.8"/>
  <!-- Body shadow for depth -->
  <ellipse cx="52" cy="48" rx="19" ry="17" fill="#501800" opacity="0.55"/>
  <!-- Main body -->
  <ellipse cx="50" cy="46" rx="19" ry="17" fill="url(#rocky-body)"/>
  <!-- Carapace segment line -->
  <path d="M34,43 Q50,31 66,43" fill="none" stroke="#f0b050" stroke-width="1.1" opacity="0.38"/>
  <path d="M33,50 Q50,38 67,50" fill="none" stroke="#f0b050" stroke-width="0.8" opacity="0.2"/>
  <!-- Tone holes (Rocky's communication organs) -->
  <circle cx="44" cy="43" r="3.2" fill="#180800"/>
  <circle cx="54" cy="41" r="3.2" fill="#180800"/>
  <circle cx="58" cy="50" r="3.2" fill="#180800"/>
  <circle cx="48" cy="54" r="3.2" fill="#180800"/>
  <circle cx="40" cy="51" r="2.5" fill="#180800"/>
  <!-- Highlight on tone holes (subtle amber ring) -->
  <circle cx="44" cy="43" r="3.2" fill="none" stroke="#c06010" stroke-width="0.6" opacity="0.6"/>
  <circle cx="54" cy="41" r="3.2" fill="none" stroke="#c06010" stroke-width="0.6" opacity="0.6"/>
  <circle cx="58" cy="50" r="3.2" fill="none" stroke="#c06010" stroke-width="0.6" opacity="0.6"/>
  <circle cx="48" cy="54" r="3.2" fill="none" stroke="#c06010" stroke-width="0.6" opacity="0.6"/>
  <!-- Body rim -->
  <ellipse cx="50" cy="46" rx="19" ry="17" fill="none" stroke="#e89030" stroke-width="1.4" opacity="0.5"/>
  <!-- Subtle heat-glow -->
  <ellipse cx="44" cy="39" rx="8" ry="5.5" fill="#ffe8a0" opacity="0.06"/>
</svg>`;

// Grace: astronaut in suit
const GRACE_SVG = `
<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" width="48" height="48" aria-label="Grace the astronaut">
  <!-- Body / spacesuit -->
  <rect x="11" y="23" width="22" height="16" rx="5" fill="#192f6a" stroke="#4a8aff" stroke-width="1.3"/>
  <!-- Helmet -->
  <circle cx="22" cy="14" r="10.5" fill="url(#grace-helm)" stroke="#5a9fff" stroke-width="1.3"/>
  <!-- Visor dark zone -->
  <path d="M13.5,13.5 Q22,20 30.5,13.5" fill="#081848" opacity="0.85"/>
  <!-- Visor reflection streak -->
  <path d="M15.5,11.5 Q21,15.5 28.5,11.5" fill="#6090ff" opacity="0.28"/>
  <!-- Arms -->
  <rect x="3"  y="23" width="8"  height="12" rx="3.5" fill="#192f6a" stroke="#4a8aff" stroke-width="1.3"/>
  <rect x="33" y="23" width="8"  height="12" rx="3.5" fill="#192f6a" stroke="#4a8aff" stroke-width="1.3"/>
  <!-- Chest panel -->
  <rect x="16" y="26" width="12" height="7" rx="1.5" fill="#0a1a50" stroke="#2a5aaa" stroke-width="0.9"/>
  <!-- Panel indicator lights -->
  <circle cx="18.5" cy="29.5" r="1.4" fill="#00e87a" opacity="0.9"/>
  <circle cx="22"   cy="29.5" r="1.4" fill="#4a8aff" opacity="0.9"/>
  <circle cx="25.5" cy="29.5" r="1.4" fill="#e87a1a" opacity="0.9"/>
</svg>`;

// ── Starfield canvas ───────────────────────────────────────────────────────────
const canvas = document.getElementById('starfield');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Generate stars with varied properties for depth
const STAR_COUNT = 320;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x:     Math.random(),
  y:     Math.random(),
  r:     Math.random() * 1.5 + 0.15,
  base:  Math.random() * 0.65 + 0.1,
  phase: Math.random() * Math.PI * 2,
  freq:  Math.random() * 0.5 + 0.15,
  // A few stars are slightly blue-tinted, a few amber
  hue:   Math.random() < 0.15 ? [220, 240, 255] : Math.random() < 0.08 ? [255, 210, 170] : [220, 225, 255],
}));

let tick = 0;
function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const W = canvas.width, H = canvas.height;
  for (const s of stars) {
    const alpha = s.base + 0.28 * Math.sin(s.phase + tick * s.freq * 0.004);
    const a = Math.max(0.04, Math.min(0.95, alpha));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${s.hue[0]},${s.hue[1]},${s.hue[2]},${a})`;
    ctx.fill();
  }
  tick++;
  requestAnimationFrame(animateStars);
}
animateStars();

// ── State ──────────────────────────────────────────────────────────────────────
/** @type {{ role: 'user' | 'assistant', content: string }[]} */
const history = [];

// ── DOM refs ───────────────────────────────────────────────────────────────────
const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('msg-input');
const sendBtn  = document.getElementById('send-btn');

// ── Helpers ────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

function scrollBottom(smooth = true) {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

function addMessage(role, text, ping = false) {
  const isRocky = role === 'assistant';
  const el = document.createElement('div');
  el.className = `message ${isRocky ? 'rocky' : 'user'}${ping ? ' ping' : ''}`;
  el.innerHTML = `
    <div class="avatar">${isRocky ? ROCKY_SVG : GRACE_SVG}</div>
    <div class="msg-body">
      <div class="msg-label">${isRocky ? 'ROCKY &nbsp;·&nbsp; ERIDIAN' : 'GRACE &nbsp;·&nbsp; HUMAN'}</div>
      <div class="bubble">${escHtml(text)}</div>
    </div>`;
  chatEl.appendChild(el);
  scrollBottom();
  if (isRocky) speakAsRocky(text, el.querySelector('.avatar'));
  return el;
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'typing-msg';
  typingEl.innerHTML = `
    <div class="avatar">${ROCKY_SVG}</div>
    <div class="typing-bubble">
      TRANSLATING ERIDIAN TONES
      <div class="dots"><span></span><span></span><span></span></div>
    </div>`;
  chatEl.appendChild(typingEl);
  scrollBottom();
}

function hideTyping() {
  typingEl?.remove();
  typingEl = null;
}

function setLoading(on) {
  sendBtn.disabled = on;
  inputEl.disabled = on;
}

// ── Sound effects (synthesised — no audio files needed) ───────────────────────
function playClickSound() {
  try {
    const ctx  = new AudioContext();
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.004));
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    gain.gain.value = 0.12;
    src.buffer = buf;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start();
    src.onended = () => ctx.close();
  } catch {}
}

function playRockyTone() {
  // Two-oscillator alien chord — like Rocky's carapace tone holes resonating
  try {
    const ctx  = new AudioContext();
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.09, ctx.currentTime + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    gain.connect(ctx.destination);
    [370, 466].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain);
      osc.start(ctx.currentTime + i * 0.04);
      osc.stop(ctx.currentTime + 0.5);
    });
    setTimeout(() => ctx.close(), 600);
  } catch {}
}

// ── API call (streaming SSE) ───────────────────────────────────────────────────
async function sendMessage(text) {
  history.push({ role: 'user', content: text });
  addMessage('user', text, false);
  setLoading(true);
  playClickSound();

  // Rocky's natural thinking pause before responding
  await new Promise(r => setTimeout(r, 420 + Math.random() * 380));
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    hideTyping();
    playRockyTone();

    // Build Rocky's message bubble (empty to start)
    const msgEl = document.createElement('div');
    msgEl.className = 'message rocky ping';
    msgEl.innerHTML = `
      <div class="avatar">${ROCKY_SVG}</div>
      <div class="msg-body">
        <div class="msg-label">ROCKY &nbsp;·&nbsp; ERIDIAN</div>
        <div class="bubble"></div>
      </div>`;
    chatEl.appendChild(msgEl);
    scrollBottom();

    const avatarEl = msgEl.querySelector('.avatar');
    const bubbleEl = msgEl.querySelector('.bubble');
    const CURSOR   = '<span class="stream-cursor"></span>';
    let fullText   = '';
    let buf        = '';

    msgEl.classList.add('transmitting');
    avatarEl.classList.add('speaking');
    bubbleEl.innerHTML = CURSOR;

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let payload;
        try { payload = JSON.parse(line.slice(6)); } catch { continue; }
        if (payload.error) throw new Error(payload.error);
        if (payload.token) {
          fullText += payload.token;
          bubbleEl.innerHTML = escHtml(fullText) + CURSOR;
          scrollBottom();
        }
        if (payload.done) {
          bubbleEl.innerHTML = escHtml(fullText);
          history.push({ role: 'assistant', content: fullText });
          msgEl.classList.remove('transmitting');
          avatarEl.classList.remove('speaking');
          speakAsRocky(fullText, avatarEl);
        }
      }
    }

  } catch (err) {
    console.error('Chat error:', err);
    hideTyping();
    document.querySelectorAll('.message.rocky.transmitting').forEach(el => {
      el.classList.remove('transmitting');
      el.querySelector('.avatar')?.classList.remove('speaking');
    });
    const errMsg = 'Signal is lost. Rocky not receive transmission. Try again?';
    history.push({ role: 'assistant', content: errMsg });
    addMessage('assistant', errMsg, true);
  } finally {
    setLoading(false);
    inputEl.focus();
  }
}

// ── Input listeners ────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  inputEl.value = '';
  sendMessage(text);
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

// ── Voice (Web Speech API) ─────────────────────────────────────────────────────
const voiceBtn  = document.getElementById('voice-btn');
const voiceIcon = document.getElementById('voice-icon');
let voiceEnabled = true;

// Speaker-on and speaker-off SVG paths
const ICON_ON  = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
const ICON_OFF = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

voiceBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceBtn.classList.toggle('active', voiceEnabled);
  voiceIcon.querySelector('path').setAttribute('d', voiceEnabled ? ICON_ON : ICON_OFF);
  if (!voiceEnabled) stopRockySpeech();
});

// Load voices — some browsers populate them async
let voices = [];
function loadVoices() {
  voices = window.speechSynthesis.getVoices();
}
loadVoices();
window.speechSynthesis.addEventListener('voiceschanged', loadVoices);

function pickVoice() {
  // Prefer a deep English voice to suit Rocky's alien translator feel
  const prefs = [
    v => v.lang === 'en-GB' && /male/i.test(v.name),
    v => /google uk english male/i.test(v.name),
    v => /david|mark|richard|daniel/i.test(v.name) && v.lang.startsWith('en'),
    v => v.lang.startsWith('en'),
  ];
  for (const pred of prefs) {
    const match = voices.find(pred);
    if (match) return match;
  }
  return voices[0] || null;
}

let speakingAvatarEl = null;
let speechRunId = 0;

function stopRockySpeech() {
  speechRunId++;
  window.speechSynthesis.cancel();
  speakingAvatarEl?.classList.remove('speaking');
  speakingAvatarEl = null;
}

function splitRockySpeech(text) {
  return text
    .replace(/\s+/g, ' ')
    .split(/(?<=[.!?])\s+|(?<=Question\?)\s*/i)
    .map(part => part.trim())
    .filter(Boolean);
}

function getRockyProsody(part) {
  const line = part.toLowerCase();
  const prosody = { pitch: 0.65, rate: 0.92, volume: 1, pause: 120 };

  if (/amaze|excite|happy|fist my bump|good plan/.test(line)) {
    prosody.pitch = 0.82;
    prosody.rate = 1.06;
    prosody.pause = 80;
  }

  if (/scary|bad|sad|danger|not hopeless/.test(line)) {
    prosody.pitch = 0.48;
    prosody.rate = 0.78;
    prosody.pause = 180;
  }

  if (/question\?$|\?$/.test(line)) {
    prosody.pitch = Math.max(prosody.pitch, 0.76);
    prosody.rate = 0.86;
    prosody.pause = 220;
  }

  if (/save team|rocky fix|big science/.test(line)) {
    prosody.pitch = 0.7;
    prosody.rate = 0.88;
    prosody.pause = 150;
  }

  return prosody;
}

function tuneProsodyForDevice(prosody) {
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (!isMobile) return prosody;

  return {
    ...prosody,
    pitch: Math.min(1.15, prosody.pitch - 0.2),
    rate: Math.min(1.15, prosody.rate + 0.00),
  };
}

function speakAsRocky(text, avatarEl) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  stopRockySpeech();

  const v = pickVoice();
  const parts = splitRockySpeech(text);
  const runId = speechRunId;

  const speakPart = (index) => {
    if (runId !== speechRunId || index >= parts.length) {
      speakingAvatarEl?.classList.remove('speaking');
      speakingAvatarEl = null;
      return;
    }

    const prosody = tuneProsodyForDevice(getRockyProsody(parts[index]));
    const utt = new SpeechSynthesisUtterance(parts[index]);
    utt.pitch = prosody.pitch;
    utt.rate = prosody.rate;
    utt.volume = prosody.volume;
    if (v) utt.voice = v;

    utt.onstart = () => {
      speakingAvatarEl = avatarEl;
      avatarEl?.classList.add('speaking');
    };
    utt.onend = () => setTimeout(() => speakPart(index + 1), prosody.pause);
    utt.onerror = () => {
      speakingAvatarEl?.classList.remove('speaking');
      speakingAvatarEl = null;
    };

    window.speechSynthesis.speak(utt);
  };

  speakingAvatarEl = avatarEl;
  avatarEl?.classList.add('speaking');
  speakPart(0);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

// ── Opening greeting (display only — not in API history) ───────────────────────
const GREETING = 'Hello Grace';

setTimeout(() => {
  // Greeting is display-only — not pushed to history because Gemini requires
  // history to start with a user turn, and the system prompt sets Rocky's context.
  addMessage('assistant', GREETING, true);
  inputEl.focus();
}, 700);
</script>
